{% extends 'layout.html' %}
{% block body %}

<div class="page-header">
  <h1><i class="fa fa-flask me-2"></i>Fertilizer Recommendation</h1>
  <p>Here's what your soil needs</p>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
      <div class="harvest-card">
        <div class="text-center mb-3">
          <div style="font-size:3.5rem;">🧪</div>
          <h4 style="font-weight:700; color:#2d6a4f; margin-top:0.5rem;">Fertilizer Advice</h4>
        </div>
        <div data-translate style="background:#f8fdf9; border-left:4px solid #52b788; border-radius:8px; padding:1.25rem 1.5rem; color:#2d3436; line-height:1.8;">
          {{ recommendation }}
        </div>
        <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
          <a href="{{ url_for('fertilizer_recommendation') }}" class="btn-harvest" style="text-decoration:none;">
            <i class="fa fa-rotate-left me-1"></i> Try Again
          </a>
          <button onclick="translateToHindi(this)" style="padding:0.65rem 1.5rem;border-radius:8px;border:1.5px solid #f4a261;color:#f4a261;font-weight:600;background:transparent;cursor:pointer;">
            <i class="fa fa-language me-1"></i> हिंदी में देखें
          </button>
          <a href="{{ url_for('home') }}" style="text-decoration:none; padding:0.65rem 1.5rem; border-radius:8px; border:1.5px solid #2d6a4f; color:#2d6a4f; font-weight:600;">
            <i class="fa fa-home me-1"></i> Home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

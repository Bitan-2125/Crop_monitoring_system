{% extends 'layout.html' %}
{% block body %}

<div class="page-header">
  <h1><i class="fa fa-leaf me-2"></i>Plant Disease Detection</h1>
  <p>Upload a photo of your plant leaf to identify diseases instantly</p>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="harvest-card">
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('disease_prediction') }}">

          <div id="drop-zone" style="
            border: 2px dashed #52b788;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            background: #f8fdf9;
            transition: background 0.2s;
          " onclick="document.getElementById('file-input').click()">
            <div id="preview-wrap" style="display:none; margin-bottom:1rem;">
              <img id="output-image" style="max-height:220px; border-radius:10px; max-width:100%;" alt="Preview">
            </div>
            <div id="upload-prompt">
              <div style="font-size:2.5rem;">📷</div>
              <p style="margin:0.5rem 0 0; color:#636e72; font-size:0.95rem;">Click to upload or drag & drop</p>
              <p style="margin:0.2rem 0 0; color:#b2bec3; font-size:0.8rem;">JPG, PNG supported</p>
            </div>
            <input type="file" id="file-input" name="file" accept="image/*" style="display:none" onchange="previewImage(event)" required>
          </div>

          <div id="file-name" style="text-align:center; margin-top:0.75rem; color:#636e72; font-size:0.85rem;"></div>

          <div class="mt-4 text-center">
            <button type="submit" class="btn-harvest">
              <i class="fa fa-magnifying-glass me-2"></i>Detect Disease
            </button>
          </div>

        </form>
      </div>

      <div class="mt-3 text-center text-muted" style="font-size:0.85rem;">
        <i class="fa fa-circle-info me-1"></i>
        For best results, use a clear, close-up photo of the affected leaf.
      </div>
    </div>
  </div>
</div>

<script>
  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      document.getElementById('output-image').src = reader.result;
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('upload-prompt').style.display = 'none';
      document.getElementById('file-name').textContent = '📎 ' + file.name;
    };
    reader.readAsDataURL(file);
  }
</script>

{% endblock %}

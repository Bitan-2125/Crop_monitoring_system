{% extends 'layout.html' %}
{% block body %}

<div class="page-header">
  <h1><i class="fa fa-seedling me-2"></i>Crop Recommendation</h1>
  <p>Enter your soil and location details to find the best crop for your farm</p>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
      <div class="harvest-card">
        <form method="POST" action="{{ url_for('crop_prediction') }}">

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Nitrogen (N)</label>
              <input type="number" class="form-control" name="nitrogen" placeholder="e.g. 50" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Phosphorous (P)</label>
              <input type="number" class="form-control" name="phosphorous" placeholder="e.g. 50" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Potassium (K)</label>
              <input type="number" class="form-control" name="pottasium" placeholder="e.g. 50" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">pH Level</label>
              <input type="number" step="0.01" class="form-control" name="ph" placeholder="e.g. 6.5" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Rainfall (mm)</label>
              <input type="number" step="0.01" class="form-control" name="rainfall" placeholder="e.g. 200" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">State</label>
              <select onchange="print_city('state', this.selectedIndex);" id="sts" name="stt" class="form-select" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">City</label>
              <select id="state" class="form-select" name="city" required></select>
              <script>print_state("sts");</script>
            </div>
          </div>

          <div class="mt-4 text-center">
            <button type="submit" class="btn-harvest">
              <i class="fa fa-magnifying-glass me-2"></i>Get Recommendation
            </button>
          </div>

        </form>
      </div>

      <div class="mt-3 text-center text-muted" style="font-size:0.85rem;">
        <i class="fa fa-circle-info me-1"></i>
        Temperature and humidity are fetched automatically based on your city.
      </div>
    </div>
  </div>
</div>

{% endblock %}

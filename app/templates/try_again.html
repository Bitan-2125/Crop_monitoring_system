{% extends 'layout.html' %}
{% block body %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="harvest-card text-center">
        <div style="font-size:4rem; margin-bottom:1rem;">😕</div>
        <h3 style="font-weight:700; color:#2d3436;">Something went wrong</h3>
        <p class="text-muted mt-2">
          We couldn't process your request right now. This might be due to an invalid city name or a temporary issue fetching weather data.
        </p>
        <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
          <a href="{{ url_for('crop_recommend') }}" class="btn-harvest" style="text-decoration:none;">
            <i class="fa fa-rotate-left me-1"></i> Try Again
          </a>
          <a href="{{ url_for('home') }}" style="text-decoration:none; padding:0.65rem 1.5rem; border-radius:8px; border:1.5px solid #2d6a4f; color:#2d6a4f; font-weight:600;">
            <i class="fa fa-home me-1"></i> Home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="{{ url_for('static', filename='scripts/cities.js') }}"></script>
  <style>
    :root {
      --green: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #d8f3dc;
      --accent: #f4a261;
      --dark: #1b1b2f;
      --text: #2d3436;
      --muted: #636e72;
      --bg: #f8fdf9;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Navbar */
    .navbar {
      background: var(--dark) !important;
      padding: 0.75rem 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .navbar-brand img { height: 42px; width: auto; border-radius: 6px; }
    .navbar-brand span {
      color: var(--green-light);
      font-weight: 700;
      font-size: 1.3rem;
      margin-left: 8px;
      vertical-align: middle;
    }
    .nav-link {
      color: rgba(255,255,255,0.8) !important;
      font-weight: 500;
      padding: 0.5rem 1rem !important;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      color: #fff !important;
      background: rgba(82,183,136,0.2);
    }
    /* Footer */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.7);
      padding: 2.5rem 0 1.5rem;
      margin-top: auto;
    }
    footer .brand { color: var(--green-light); font-size: 1.4rem; font-weight: 700; text-decoration: none; }
    footer p { margin: 0.3rem 0; font-size: 0.85rem; }
    footer a { color: var(--green-light); text-decoration: none; }
    /* Shared card */
    .harvest-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
    }
    /* Buttons */
    .btn-harvest {
      background: var(--green);
      color: #fff;
      border: none;
      padding: 0.65rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-harvest:hover { background: var(--green-light); color: #fff; transform: translateY(-1px); }
    /* Form controls */
    .form-label { font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
    .form-control, .form-select {
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
    }
    /* Page header */
    .page-header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
      color: #fff;
      padding: 3rem 0 2.5rem;
      text-align: center;
    }
    .page-header h1 { font-weight: 700; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .page-header p { opacity: 0.9; font-size: 1rem; margin: 0; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Harvestify Logo">
      <span>Harvestify</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}"><i class="fa fa-home me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('crop_recommend') }}"><i class="fa fa-seedling me-1"></i>Crop</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('fertilizer_recommendation') }}"><i class="fa fa-flask me-1"></i>Fertilizer</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('disease_prediction') }}"><i class="fa fa-leaf me-1"></i>Disease</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('market_price') }}"><i class="fa fa-chart-line me-1"></i>Market</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('crop_planning') }}"><i class="fa fa-calendar-alt me-1"></i>Plan</a></li>
      </ul>
    </div>
  </div>
</nav>

{% block body %}{% endblock %}

<footer>
  <div class="container text-center">
    <a href="{{ url_for('home') }}" class="brand">🌿 Harvestify</a>
    <p class="mt-2">An Environmental Intelligence Platform</p>
    <p class="mt-1">Made with ❤️ by Bits &nbsp;|&nbsp; &copy; 2026 Bits</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function translateToHindi(btn) {
  const blocks = document.querySelectorAll('[data-translate]');
  if (!blocks.length) return;

  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin me-1"></i> Translating...';

  const texts = Array.from(blocks).map(b => b.innerText.trim());

  fetch('/translate-hindi', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ blocks: texts })
  })
  .then(r => r.json())
  .then(data => {
    if (data.blocks) {
      blocks.forEach((b, i) => {
        if (data.blocks[i]) b.innerHTML = data.blocks[i];
      });
    }
    btn.innerHTML = '<i class="fa fa-language me-1"></i> हिंदी में देखें';
    btn.disabled = false;
  })
  .catch(() => {
    btn.innerHTML = '<i class="fa fa-language me-1"></i> हिंदी में देखें';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
